<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1100">
<title>صفحة الماكينة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="header"><div class="header-content">
<button class="back-btn" onclick="history.back()">↩ السابق</button>
<div class="brand"><div class="brand-name">Haier</div><div class="brand-subtitle">نظام إدارة الصيانة</div></div>
<a href="index.html" class="home-btn">🏠 الرئيسية</a>
</div></header>
<main class="container">
<div class="machine-info-card">
<div class="machine-id-large" id="machineId">HEE-M00</div>
<h2 id="machineName">جاري التحميل...</h2>
</div>
<div class="actions-section">
<h3>اختر الإجراء المطلوب:</h3>
<div class="actions-buttons">
<button class="action-btn btn-danger" id="btnBreakdown">
<img src="images/breakdown-icon.png" class="btn-icon-img" alt="">
<span class="action-text">تسجيل عطل جديد</span>
</button>
<button class="action-btn btn-success" id="btnPM">
<img src="images/pm-icon.png" class="btn-icon-img" alt="">
<span class="action-text">تسجيل صيانة وقائية</span>
</button>
<button class="action-btn btn-primary" id="btnExcel">
<span class="action-icon">📊</span>
<span class="action-text">عرض سجل الصيانة</span>
</button>
</div>
</div>
<div class="instructions-box">
<h4>💡 تعليمات:</h4>
<ol>
<li>اضغط الزر المناسب أعلاه</li>
<li>سيتم فتح النموذج مع تعبئة اسم الماكينة تلقائياً</li>
<li>أكمل باقي البيانات واضغط إرسال</li>
</ol>
</div>
</main>
<footer class="footer">Haier Maintenance System © 2026</footer>
<script src="app.js"></script>
</body>
</html>
